services:
  db:
    image: postgres:16
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - group-project:/var/lib/postgresql
      - ./src/init_data:/docker-entrypoint-initdb.d
  web:
    image: node:22
    user: 'node'
    working_dir: /repository
    env_file: .env
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./:/repository
    command: 'sh -c "npm install && npm run testandrun"'
volumes:
  group-project:
